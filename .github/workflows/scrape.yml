name: Orbit Data Aggregation Scraper

on:
  schedule:
    # Run every 24 hours (at 00:00 UTC)
    - cron: '0 0 * * *'
  workflow_dispatch:
    # Allow manual runs from the GitHub Actions tab

jobs:
  scrape-and-sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scraper/requirements.txt

      # Playwright is still needed for the Devpost hackathon scraper
      - name: Install Playwright Chromium & OS Dependencies
        run: |
          playwright install --with-deps chromium

      - name: Run Scraper Pipeline
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          APIFY_API_TOKEN: ${{ secrets.APIFY_API_TOKEN }}
        run: |
          python scraper/main.py
